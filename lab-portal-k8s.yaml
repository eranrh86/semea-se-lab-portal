---
apiVersion: v1
kind: Namespace
metadata:
  name: claude-lab
  labels:
    app: claude-lab-portal

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lab-portal-html
  namespace: claude-lab
data:
  index.html: |
    # PLACEHOLDER - replaced by create-configmap.sh

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-portal
  namespace: claude-lab
  labels:
    app: lab-portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lab-portal
  template:
    metadata:
      labels:
        app: lab-portal
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 30
      volumes:
      - name: html
        configMap:
          name: lab-portal-html

---
apiVersion: v1
kind: Service
metadata:
  name: lab-portal-svc
  namespace: claude-lab
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
spec:
  type: LoadBalancer
  loadBalancerSourceRanges:
    - "87.71.217.38/32"
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: lab-portal
